name: K6 Performance Tests + Report + Email

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  smoke-test:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run smoke test
        run: |
          mkdir -p reports
          k6 run --out json=reports/smoke-result.json tests/auth-load-test.js || true
        continue-on-error: true

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: reports/smoke-result.json
          retention-days: 30

  auth-test:
    name: 🔐 Auth Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run auth test
        run: |
          mkdir -p reports
          k6 run --out json=reports/auth-result.json tests/authUserinfotest.js || true
        continue-on-error: true

      - name: Upload auth report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-test-results
          path: reports/auth-result.json

  employee-test:
    name: 👥 Employee Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run employee test
        run: |
          mkdir -p reports
          k6 run --out json=reports/employee-result.json tests/employee_list.js || true
        continue-on-error: true

      - name: Upload employee report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: employee-test-results
          path: reports/employee-result.json

  send-email:
    name: 📧 Send Email Report
    runs-on: ubuntu-latest
    needs: [smoke-test, auth-test, employee-test]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📧 Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          
          subject: "🧪 k6 Performance Test Report"
          to: ${{ secrets.EMAIL_TO }}
          from: "k6-Bot <${{ secrets.EMAIL_FROM }}>"
          
          body: |
            ✅ SmartPeople k6 Performance Test Report
            
            📊 Test Status:
            • Smoke Test: ✅ Completed
            • Auth Test: ✅ Completed
            • Employee Test: ✅ Completed
            
            🔗 Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}