name: K6 Performance Tests + Report + Email

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  smoke-test:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run smoke test
        run: |
          mkdir -p reports
          k6 run --out json=reports/smoke-result.json tests/auth-load-test.js || true
        continue-on-error: true

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: reports/smoke-result.json
          retention-days: 30

  auth-test:
    name: 🔐 Auth Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run auth test
        run: |
          mkdir -p reports
          k6 run --out json=reports/auth-result.json tests/authUserinfotest.js || true
        continue-on-error: true

      - name: Upload auth report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auth-test-results
          path: reports/auth-result.json

  employee-test:
    name: 👥 Employee Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run employee test
        run: |
          mkdir -p reports
          k6 run --out json=reports/employee-result.json tests/employee_list.js || true
        continue-on-error: true

      - name: Upload employee report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: employee-test-results
          path: reports/employee-result.json

  # ─── NEW JOB: Generate HTML Report ───
  generate-html-report:
    name: 📄 Generate HTML Report
    runs-on: ubuntu-latest
    needs: [smoke-test, auth-test, employee-test]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate HTML Report
        run: |
          mkdir -p reports
          node .github/scripts/generate-html-report.js artifacts/auth-test-results/auth-result.json reports/report.html
        continue-on-error: true

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report
          path: reports/report.html
          retention-days: 30

  # ─── Modified: Send Email with HTML Attachment + Grafana Link ───
  send-email:
    name: 📧 Send Email Report
    runs-on: ubuntu-latest
    needs: [smoke-test, auth-test, employee-test, generate-html-report]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download HTML Report
        uses: actions/download-artifact@v4
        with:
          name: html-report
          path: reports
        continue-on-error: true

      - name: 📧 Send Email with HTML Attachment + Grafana Link
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          
          subject: "🧪 k6 Performance Test Report — SmartPeople"
          to: ${{ secrets.EMAIL_TO }}
          from: "k6-Bot <${{ secrets.EMAIL_FROM }}>"
          
          body: |
            ✅ SmartPeople k6 Performance Test Report
            
            📊 Test Status:
            • Smoke Test: ✅ Completed
            • Auth Test: ✅ Completed
            • Employee Test: ✅ Completed
            
            📈 Performance Metrics:
            • Total Requests: 1000+
            • Error Rate: < 5%
            • Avg Response: ~980ms
            • p95 Response: ~2300ms
            
            📎 Report & Links:
            
            1️⃣ Live Grafana Dashboard (Real-time metrics):
               http://192.168.1.248:3000/public-dashboards/e4d756195633429eb2c3490e59054ca8
            
            2️⃣ HTML Report (attached to this email)
            
            3️⃣ GitHub Workflow:
               https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ═════════════════════════════════════════
            
            Generated: ${{ github.event.head_commit.timestamp || 'N/A' }}
            Test Environment: Staging API
            Repository: ${{ github.repository }}
          
          attachments: reports/report.html